name: Daily data refresh

# 평일 미국 장 마감 후 데이터를 자동 갱신한다.
#  - daily_update.py : S&P 500(미국) 주가·재무 수집 + 전체 재스크린
#  - collect_kr.py   : 코스피·코스닥(한국) 주가·재무 수집 + 전체 재스크린
# 갱신된 screener.db 스냅샷을 커밋·push하면 Render가 자동 재배포한다.
# (DART 분기재무·섹터 백필은 분기/비정기 작업이라 여기서 제외 — 비밀키 불필요)

on:
  workflow_dispatch:        # 수동 실행 버튼
  schedule:
    - cron: "0 22 * * *"    # 매일 22:00 UTC(미국 장 마감 후) = 07:00 KST 다음날

# 동시 실행 방지(이전 런이 끝나기 전 새 런이 겹치지 않게)
concurrency:
  group: daily-refresh
  cancel-in-progress: false

permissions:
  contents: write           # screener.db 커밋·push 권한

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        # finance-datareader는 한국 종목 수집에만 필요(서버 requirements에는 제외돼 있음)
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt finance-datareader

      - name: Collect US data + screen
        run: python scripts/daily_update.py

      - name: Collect KR data + screen
        run: python scripts/collect_kr.py

      - name: Backfill US quarterly EPS history (Alpha Vantage)
        # 미국 관심권 종목의 분기 EPS 이력을 채워 '3분기 연속 EPS YoY' 판정을 가능케 한다.
        # 무료 키는 하루 25건이라 미완성 종목을 매일 점진 완성(skip 로직). 한도/실패해도
        # 파이프라인 전체는 계속 진행(continue-on-error).
        continue-on-error: true
        env:
          ALPHAVANTAGE_API_KEY: ${{ secrets.ALPHAVANTAGE_API_KEY }}
        run: python scripts/backfill_eps.py --limit 25

      - name: Recompute YoY growth (network-free)
        # DB에 누적된 분기 재무로 매출·영업이익·EPS의 YoY를 재계산(날짜 매칭).
        run: python scripts/recompute_yoy.py

      - name: Commit refreshed snapshot DB & trigger Render deploy
        env:
          RENDER_DEPLOY_HOOK: ${{ secrets.RENDER_DEPLOY_HOOK }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add screener.db
          if git diff --staged --quiet; then
            echo "변경 없음 — 커밋·배포 건너뜀(데이터가 갱신되지 않았거나 수집 실패)"
            exit 0
          fi
          git commit -m "chore: 데이터 자동 갱신 (screener.db 스냅샷) [skip ci]"
          # 수집이 ~10분 걸리는 동안 개발 푸시로 origin이 움직이면 push가 non-fast-forward로
          # 거부된다(과거 실패 원인). push 전에 rebase로 원격 변경을 흡수하고 최대 5회 재시도.
          pushed=""
          for i in 1 2 3 4 5; do
            if git pull --rebase --autostash origin main && git push; then
              pushed=1; break
            fi
            echo "push 실패(원격이 갱신됨) — 재시도 $i/5"
            sleep 5
          done
          if [ -z "$pushed" ]; then
            echo "::error::screener.db push 실패(5회 재시도 후)"; exit 1
          fi
          # Render 배포 훅은 실패해도 데이터 push 성공을 망치지 않도록 비치명적 처리(-f 제거)
          if [ -n "$RENDER_DEPLOY_HOOK" ]; then
            curl -sS -X POST "$RENDER_DEPLOY_HOOK" && echo "Render 배포 트리거 완료" \
              || echo "::warning::Render 배포 훅 호출 실패 — 데이터 push는 성공(자동배포로 반영)"
          else
            echo "RENDER_DEPLOY_HOOK secret 미설정 — Render 자동배포에 의존"
          fi
