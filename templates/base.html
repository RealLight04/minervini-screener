<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}Minervini Screener{% endblock %}</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Segoe UI', sans-serif; background: #0f172a; color: #e2e8f0; min-height: 100vh; }
    header { background: #1e293b; padding: 16px 32px; border-bottom: 1px solid #334155; display: flex; align-items: center; gap: 16px; }
    header h1 { font-size: 1.25rem; font-weight: 700; color: #38bdf8; }
    header a { color: #94a3b8; text-decoration: none; font-size: 0.9rem; }
    header a:hover { color: #e2e8f0; }
    .container { max-width: 1200px; margin: 0 auto; padding: 24px 16px; }
    .badge { display: inline-block; padding: 2px 8px; border-radius: 4px; font-size: 0.75rem; font-weight: 600; }
    .badge-green { background: #14532d; color: #4ade80; }
    .badge-red { background: #450a0a; color: #f87171; }
    .badge-gray { background: #1e293b; color: #94a3b8; }
    table { width: 100%; border-collapse: collapse; }
    th { text-align: left; padding: 10px 12px; background: #1e293b; color: #94a3b8; font-size: 0.8rem; text-transform: uppercase; letter-spacing: 0.05em; }
    td { padding: 10px 12px; border-bottom: 1px solid #1e293b; font-size: 0.9rem; }
    tr:hover td { background: #1e293b; }
    a.ticker-link { color: #38bdf8; text-decoration: none; font-weight: 600; }
    a.ticker-link:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <header>
    <h1>📈 Minervini Screener</h1>
    <a href="/">홈</a>
    <form action="/search" method="get" style="margin-left:auto;">
      <input name="ticker" placeholder="티커 검색 (예: NVDA)" autocomplete="off"
             style="background:#0f172a; border:1px solid #334155; color:#e2e8f0; padding:6px 10px; border-radius:6px; font-size:0.85rem; width:180px;">
    </form>
  </header>
  <div class="container">
    {% block content %}{% endblock %}
  </div>
  {% block scripts %}{% endblock %}
</body>
</html>
